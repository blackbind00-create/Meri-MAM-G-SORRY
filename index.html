<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I'm Sorry — [Her Name]</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);

            padding: 50px 20px;
            min-height: 100vh;

        h1 { font-size: 3em; margin-bottom: 10px; }

            padding: 30px;

            line-height: 1.6;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .memory {
            margin: 20px 0;
            padding: 15px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
        }
        .button {
            background: #ff6b6b;
            color: white;
            padding: 15px 30px;

            border-radius: 30px;
